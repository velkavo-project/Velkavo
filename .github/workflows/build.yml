name: Build

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build-linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            libboost-all-dev libssl-dev libzmq3-dev libunbound-dev \
            libsodium-dev libhidapi-dev liblzma-dev libreadline-dev

      - name: Configure
        run: |
          mkdir -p build/release && cd build/release
          cmake -DCMAKE_BUILD_TYPE=Release -DMANUAL_SUBMODULES=1 ../..

      - name: Build
        run: make -C build/release daemon -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: velkarod-linux-x86_64
          path: build/release/bin/velkarod

  build-linux-arm64:
    name: Linux ARM64 (Raspberry Pi)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build inside ARM64 container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          platforms: linux/arm64
          file: .github/Dockerfile.arm64
          outputs: type=local,dest=./arm64-out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: velkarod-linux-arm64
          path: arm64-out/velkarod

  release:
    name: Attach binaries to release
    needs: [build-linux-x86_64, build-linux-arm64]
    if: github.event_name == 'release'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4

      - name: Rename binaries
        run: |
          mv velkarod-linux-x86_64/velkarod velkarod-linux-x86_64
          mv velkarod-linux-arm64/velkarod velkarod-linux-arm64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            velkarod-linux-x86_64
            velkarod-linux-arm64
