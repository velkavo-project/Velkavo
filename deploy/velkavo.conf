# Velkavo Node Configuration
data-dir=/var/lib/velkavo
log-file=/var/log/velkavo/velkarod.log
log-level=1
# P2P
p2p-bind-port=19080
p2p-external-port=19080
# RPC (localhost only - do not expose to internet)
rpc-bind-ip=127.0.0.1
rpc-bind-port=19081
rpc-login=
# Limits
out-peers=64
in-peers=128
limit-rate-up=8192
limit-rate-down=32768
